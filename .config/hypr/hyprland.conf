#monitor=eDP-1,disable
#monitor=HDMI-A-1,preferred,auto,auto

exec-once = wbg -s $HOME/wall/city.jpg
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypr-portal
exec-once = sakura

$terminal = sakura
$fileManager = thunar
$menu2 = hyprlauncher
$menu = wofi -S drun
$screenshot = flameshot gui

env = XCURSOR_THEME,Catppuccin-Mocha-Dark
env = XCURSOR_SIZE,16
env = HYPRCURSOR_SIZE,16
env = QT_QPA_PLATFORMTHEME,qt6ct

general {
	gaps_in = 4
		gaps_out = 4
		border_size = 1
		col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
		col.inactive_border = rgba(595959aa)
		resize_on_border = false
		allow_tearing = false
		layout = master
}

decoration {
	rounding = 4
		rounding_power = 2
		active_opacity = 1.0
		inactive_opacity = 1.0
		shadow {
			enabled = true
				range = 4
				render_power = 3
				color = rgba(1a1a1aee)
		}
	blur {
		enabled = true
			size = 5
			passes = 1
			vibrancy = 0.1696
	}
}

animations {
	enabled = yes, please :)
		bezier = easeOutQuint,   0.23, 1,    0.32, 1
		bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
		bezier = linear,         0,    0,    1,    1
		bezier = almostLinear,   0.5,  0.5,  0.75, 1
		bezier = quick,          0.15, 0,    0.1,  1
		animation = global,        1,     10,    default
		animation = border,        1,     5.39,  easeOutQuint
		animation = windows,       1,     4.79,  easeOutQuint
		animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
		animation = windowsOut,    1,     1.49,  linear,       popin 87%
		animation = fadeIn,        1,     1.73,  almostLinear
		animation = fadeOut,       1,     1.46,  almostLinear
		animation = fade,          1,     3.03,  quick
		animation = layers,        1,     3.81,  easeOutQuint
		animation = layersIn,      1,     4,     easeOutQuint, fade
		animation = layersOut,     1,     1.5,   linear,       fade
		animation = fadeLayersIn,  1,     1.79,  almostLinear
		animation = fadeLayersOut, 1,     1.39,  almostLinear
		animation = workspaces,    1,     1.94,  almostLinear, fade
		animation = workspacesIn,  1,     1.21,  almostLinear, fade
		animation = workspacesOut, 1,     1.94,  almostLinear, fade
		animation = zoomFactor,    1,     7,     quick
}

dwindle {
	pseudotile = true
		preserve_split = true
}

master {
	new_status = false
    mfact = 0.58
}

misc {
	force_default_wallpaper = -1
		disable_hyprland_logo = false
}

input {
	kb_layout = fr
		kb_variant =
		kb_model =
		kb_options = caps:escape
		kb_rules =
		follow_mouse = 1
		sensitivity = 0
		touchpad {
			natural_scroll = false
		}
}

gesture = 3, horizontal, workspace

device {
	name = epic-mouse-v1
		sensitivity = -0.5
}

$mainMod = ALT

bind = $mainMod SHIFT, RETURN, exec, $terminal
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, F, exec, $screenshot
bind = $mainMod, P, exec, $menu
bind = $mainMod, D, exec, $menu2
bind = $mainMod, R, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, SPACE, togglefloating,
bind = $mainMod, E, pseudo,
bind = $mainMod, I, layoutmsg, togglesplit

bind = $mainMod, K, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, ampersand,  workspace, 1
bind = $mainMod, eacute,     workspace, 2
bind = $mainMod, quotedbl,   workspace, 3
bind = $mainMod, apostrophe, workspace, 4
bind = $mainMod, parenleft,  workspace, 5
bind = $mainMod, minus,      workspace, 6
bind = $mainMod, egrave,     workspace, 7
bind = $mainMod, underscore, workspace, 8
bind = $mainMod, ccedilla,   workspace, 9
bind = $mainMod, 0,          workspace, 10

bind = $mainMod SHIFT, ampersand,  movetoworkspace, 1
bind = $mainMod SHIFT, eacute,     movetoworkspace, 2
bind = $mainMod SHIFT, quotedbl,   movetoworkspace, 3
bind = $mainMod SHIFT, apostrophe, movetoworkspace, 4
bind = $mainMod SHIFT, parenleft,  movetoworkspace, 5
bind = $mainMod SHIFT, minus,      movetoworkspace, 6
bind = $mainMod SHIFT, egrave,     movetoworkspace, 7
bind = $mainMod SHIFT, underscore, movetoworkspace, 8
bind = $mainMod SHIFT, ccedilla,   movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, D, togglespecialworkspace, magic
bind = $mainMod SHIFT, D, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = ALT, TAB, workspace, previous

bind = $mainMod, RETURN, movewindow, l

bind = $mainMod, M, resizeactive, 30 0
bind = $mainMod, J, resizeactive, -30 0
bind = $mainMod SHIFT, M, resizeactive, 0 -10
bind = $mainMod SHIFT, J, resizeactive, 0 10

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule {
	 name = suppress-maximize-events
		 match:class = .*
		 suppress_event = maximize
}

windowrule {
	name = fix-xwayland-drags
		match:class = ^$
		match:title = ^$
		match:xwayland = true
		match:float = true
		match:fullscreen = false
		match:pin = false
		no_focus = true
}

windowrule {
	name = move-hyprland-run
		match:class = hyprland-run
		move = 20 monitor_h-120
		float = yes
}

windowrule {
	name = chromium-workspace
		match:class = ^(.*Chromium.*)$
		workspace = 2
}

windowrule {
	name = nemo-workspace
		match:class = ^(.*nemo.*)$
		workspace = 7
}

windowrule {
	name = virt-manager-workspace
		match:class = ^(.*virt-manager.*)$
		workspace = 9
}

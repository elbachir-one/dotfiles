font=ProFontIIx NF:size=12
font-bold=ProFontIIx NF:size=12
font-italic=ProFontIIx NF:size=12
font-bold-italic=ProFontIIx NF:size=12

[scrollback]
lines=1000

[url]
launch=xdg-open ${url}

[cursor]
style=beam
blink=yes

[mouse]
hide-when-typing=yes

[colors-dark]
alpha=0.9
background=000000
foreground=ffffff
flash=7f7f00
flash-alpha=0.5

cursor=333333 5dc5f8

regular0=242424
regular1=f62b5a
regular2=47b413
regular3=e3c401
regular4=24acd4
regular5=f2affd
regular6=13c299
regular7=e6e6e6

bright0=616161
bright1=ff4d51
bright2=35d450
bright3=e9e836
bright4=5dc5f8
bright5=feabf2
bright6=24dfc4
bright7=ffffff

[key-bindings]
scrollback-up-page=Shift+Page_Up
scrollback-down-page=Shift+Page_Down
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

[search-bindings]
commit=Return
find-prev=Control+r
find-next=Control+s
delete-prev-word=Mod1+BackSpace Control+BackSpace
clipboard-paste=Control+v Control+Shift+v Control+y XF86Paste
primary-paste=Shift+Insert

[mouse-bindings]
scrollback-up-mouse=BTN_BACK
scrollback-down-mouse=BTN_FORWARD
primary-paste=BTN_MIDDLE
